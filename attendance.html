<!DOCTYPE html>
<html>
<head>
<title>Attendance</title>

<style>

body{
font-family:Arial;
background:#eef3f9;
margin:0;
}

header{
background:#0A4D8C;
color:white;
padding:20px;
text-align:center;
font-size:28px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:12px;
text-align:center;
}

th{
background:#0A4D8C;
color:white;
}

button{
padding:8px 15px;
border:none;
border-radius:8px;
cursor:pointer;
}

.present{
background:green;
color:white;
}

.absent{
background:red;
color:white;
}

</style>

</head>

<body>

<header>

📅 Attendance

</header>

<table>

<tr>

<th>Student</th>

<th>Present</th>

<th>Absent</th>

</tr>

<tr>

<td>Demo Student</td>

<td><button class="present">P</button></td>

<td><button class="absent">A</button></td>

</tr>

</table>

</body>
</html>
