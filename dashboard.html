<title>DM Tuition Classes ERP - Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#eef3f9;
}

.header{
background:#0A4D8C;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.welcome{
padding:20px;
font-size:22px;
font-weight:bold;
color:#0A4D8C;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
text-align:center;
transition:.3s;
}

.card:hover{
transform:scale(1.05);
}

.card h2{
font-size:20px;
margin-bottom:10px;
color:#0A4D8C;
}

.number{
font-size:34px;
font-weight:bold;
color:#ff9800;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:20px;
}

.menu a{
text-decoration:none;
background:#0A4D8C;
color:white;
padding:18px;
border-radius:12px;
text-align:center;
font-size:18px;
font-weight:bold;
}

.menu a:hover{
background:#083766;
}

.footer{
margin-top:30px;
background:#0A4D8C;
color:white;
text-align:center;
padding:15px;
}

</style>

</head>
